






<!DOCTYPE html>
<html>
    <head>
        
        <n:script type="text/javascript" src="/javascripts/lib/jquery-3.7.1.min.js"></n:script>
        <n:script type="text/javascript" src="/javascripts/projectInput.js"></n:script>
        <n:script type="text/javascript" src="/javascripts/clientList.js"></n:script>
        <title>プロジェクト変更画面</title>
    </head>
    <body>
        <div class="mainContents">
            
            
        </div>
        <section>
            <form method="POST" useToken="true">
                <div class="title-nav">
                    <span class="page-title">プロジェクト変更画面</span>
                    <div class="button-nav">
                        
                            <a href="/action/project/show/__EL__" cssClass="btn btn-lg btn-light">戻る</a>
                            <button value="削除" uri="#" id="topDeleteButton" cssClass="btn btn-lg btn-danger" type="button" allowDoubleSubmission="false" suppressDefaultSubmit="true" />
                            <button value="更新" uri="#" id="topUpdateButton" cssClass="btn btn-lg btn-success" type="button" suppressDefaultSubmit="true" />
                        
                        
                            <button value="入力へ戻る" uri="#" id="topBackButton" cssClass="btn btn-lg btn-light" type="button" suppressDefaultSubmit="true" />
                            <button value="確定" uri="#" id="topSubmitButton" cssClass="btn btn-lg btn-success" type="button" allowDoubleSubmission="false" suppressDefaultSubmit="true" />
                        
                    </div>
                </div>
            </form>
            <div class="message-area margin-top">
                
            </div>
            <h2 class="font-group mb-3">
                プロジェクト詳細
            </h2>
            <form useToken="true">
                <table class="table">
                    <tbody>
                        <tr>
                            <th class="width-250 required">
                                プロジェクト名
                            </th>
                            <td>
                                <div class="form-group">
                                    <input type="text" name="form.projectName" maxlength="64" cssClass="form-control form-control-lg width-300" errorCss="input-error" />
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th class="required">
                                プロジェクト種別
                            </th>
                            <td>
                                <div class="form-group">
                                    <n:set var="projectTypeList" value=""/>
                                    <select name="form.projectType"
                                              listName="projectTypeList"
                                              elementValueProperty="value"
                                              elementLabelProperty="label"
                                              elementLabelPattern="$LABEL$"
                                              cssClass="form-control form-control-lg"/>
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th class="required">
                                プロジェクト分類
                            </th>
                            <td>
                                <div class="form-group">
                                    <n:set var="projectClassList" value=""/>
                                    <select name="form.projectClass"
                                              listName="projectClassList"
                                              elementValueProperty="value"
                                              elementLabelProperty="label"
                                              elementLabelPattern="$LABEL$"
                                              cssClass="form-control form-control-lg"/>
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>
                                プロジェクトマネージャー
                            </th>
                            <td>
                                <div class="form-group">
                                    <input type="text" name="form.projectManager" maxlength="64" cssClass="form-control form-control-lg width-300" errorCss="input-error"/>
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>
                                プロジェクトリーダー
                            </th>
                            <td>
                                <div class="form-group">
                                    <input type="text" name="form.projectLeader" maxlength="64" cssClass="form-control form-control-lg width-300" errorCss="input-error"/>
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th class="required">
                                顧客名
                            </th>
                            <td>
                                <div class="form-group">
                                  <input type="text" name="form.clientId" maxlength="10" readonly="true" cssClass="form-control form-control-lg mb-1" tabindex="-1" id="client-id" errorCss="input-error" />
                                  <input type="text" name="form.clientName" maxlength="64" readonly="true" cssClass="form-control form-control-lg mb-1" tabindex="-1" id="client-name" errorCss="input-error" />
                                </div>
                                
                                  <div class="btn-group-sm">
                                    <a href="#" data-bs-toggle="modal" data-bs-target="#client-search-dialog" class="badge rounded-pill text-dark bg-body-secondary"><i class="material-icons">search</i></a>
                                    <a href="#" class="badge rounded-pill text-dark bg-body-secondary" id="client-remove"><i class="material-icons">remove</i></a>
                                  </div>
                                
                                
                                
                            </td>
                        </tr>
                        <tr>
                            <th>
                                プロジェクト開始日
                            </th>
                            <td>
                                <div class="form-group">
                                  <n:set var="projectStartDate" name="form.projectStartDate" scope="page" />
                                  <input type="text" name="form.projectStartDate" nameAlias="form.date"
                                          value="__EL__"
                                          cssClass="form-control form-control-lg datepicker" errorCss="input-error" />
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>
                                プロジェクト終了日
                            </th>
                            <td>
                                <div class="form-group">
                                  <n:set var="projectEndDate" name="form.projectEndDate" scope="page" />
                                  <input type="text" name="form.projectEndDate" nameAlias="form.date"
                                          value="__EL__"
                                          cssClass="form-control form-control-lg datepicker" errorCss="input-error" />
                                    
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>
                                備考
                            </th>
                            <td>
                                <div class="form-group">
                                    <textarea rows="5" cols="50" name="form.note" cssClass="form-control form-control-lg" errorCss="input-error"/>
                                    
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <th>
                                売上高
                            </th>
                            <td>
                                
                                <div class="form-group">
                                    <input type="text" name="form.sales" maxlength="9" cssClass="form-control form-control-lg width-200 me-3" errorCss="input-error" style="float:left" />
                                    <div style="display:table-cell;height:30px;vertical-align:bottom;">千円</div>
                                    <div style="clear:left;"></div>
                                </div>
                                
                                
                                  <n:write value="__EL__" />
                                
                            </td>
                        </tr>
                        <tr>
                            <th>
                                売上原価
                            </th>
                            <td>
                                
                                <div class="form-group">
                                    <input type="text" name="form.costOfGoodsSold" maxlength="9" cssClass="form-control form-control-lg width-200 me-3" errorCss="input-error" style="float:left" />
                                    <div style="display:table-cell;height:30px;vertical-align:bottom;">千円</div>
                                    <div style="clear:left;"></div>
                                </div>
                                
                                
                                  <n:write value="__EL__" />
                                
                            </td>
                        </tr>
                        <tr>
                            <th>
                                販管費
                            </th>
                            <td>
                                
                                <div class="form-group">
                                    <input type="text" name="form.sga" maxlength="9" cssClass="form-control form-control-lg width-200 me-3" errorCss="input-error" style="float:left" />
                                    <div style="display:table-cell;height:30px;vertical-align:bottom;">千円</div>
                                    <div style="clear:left;"></div>
                                </div>
                                
                                
                                  <n:write value="__EL__" />
                                
                            </td>
                        </tr>
                        <tr>
                            <th>
                                本社配賦
                            </th>
                            <td>
                                
                                <div class="form-group">
                                    <input type="text" name="form.allocationOfCorpExpenses" maxlength="9" cssClass="form-control form-control-lg width-200 me-3" errorCss="input-error" style="float:left" />
                                    <div style="display:table-cell;height:30px;vertical-align:bottom;">千円</div>
                                    <div style="clear:left;"></div>
                                </div>
                                
                                
                                  <n:write
                                      value="__EL__" />
                                
                            </td>
                        </tr>
                        
                            <tr>
                                <td>
                                    売上総利益
                                </td>
                                <td>
                                  <n:write value="__EL__" />
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    配賦前利益
                                </td>
                                <td>
                                  <n:write
                                      value="__EL__" />
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    配賦前利益率
                                </td>
                                <td>
                                  <n:write
                                      value="__EL__" />
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    営業利益
                                </td>
                                <td>
                                  <n:write value="__EL__" />
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    営業利益率
                                </td>
                                <td>
                                  <n:write value="__EL__" />
                                </td>
                            </tr>
                        
                    </tbody>
                </table>
                <div class="title-nav page-footer">
                    <div class="button-nav">
                        
                            <a href="/action/project/show/__EL__" cssClass="btn btn-lg btn-light">戻る</a>
                            <button value="削除" uri="/action/project/delete" id="bottomDeleteButton" cssClass="btn btn-lg btn-danger" allowDoubleSubmission="false" type="button" />
                            <button value="更新" uri="/action/project/confirmOfUpdate" id="bottomUpdateButton" cssClass="btn btn-lg btn-success" type="button" />
                        
                        
                            <button value="入力へ戻る" uri="/action/project/backToEdit" id="bottomBackButton" cssClass="btn btn-lg btn-light" type="button" />
                            <button value="確定" uri="/action/project/update" id="bottomSubmitButton" cssClass="btn btn-lg btn-success" allowDoubleSubmission="false" type="button" />
                        
                    </div>
                </div>
            </form>
        </section>
        

        
        
    </body>
</html>
